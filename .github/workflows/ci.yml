name: CI / Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Type-check & tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Generar Prisma Client
        run: npx prisma generate

      - name: Type-check TypeScript
        run: npx tsc --noEmit

      - name: Tests unitarios
        run: npm test

  deploy:
    name: Deploy a producción (Next.js)
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: Crear .vercel/project.json
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' \
            '${{ secrets.VERCEL_PROJECT_ID }}' \
            '${{ secrets.VERCEL_ORG_ID }}' > .vercel/project.json

      - name: Deploy a producción
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}

# Este workflow NO despliega nuxt-app/: es un proyecto Vercel aparte
# (nuxt-app-chi-ivory.vercel.app) que tiene su propia integración de Git y se
# despliega solo en cada push a master. Ojo: por eso su deploy NO espera al job
# `check` — si necesitás que los tests lo bloqueen, hay que apagar esa
# integración en el dashboard y agregar aquí un job equivalente al de arriba,
# con working-directory nuxt-app y su propio projectId.
