name: CI / Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Type-check & tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Generar Prisma Client
        run: npx prisma generate

      - name: Type-check TypeScript
        run: npx tsc --noEmit

      - name: Tests unitarios
        run: npm test

  deploy:
    name: Deploy a producción
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: Verificar token (whoami)
        run: vercel whoami --token=${{ secrets.VERCEL_TOKEN }}

      - name: Verificar acceso al proyecto via API
        run: |
          HTTP=$(curl -s -o /tmp/proj.json -w "%{http_code}" \
            "https://api.vercel.com/v9/projects/prj_xosOGb6BZ7iSaT5vv1TMlfjkx8pa?teamId=team_VwT84Fy6eq9nKShqLWM0O8tY" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}")
          echo "HTTP status: $HTTP"
          cat /tmp/proj.json
          [ "$HTTP" = "200" ] || exit 1

      - name: Vincular proyecto con vercel link
        run: vercel link --yes --project=almacen-sistema --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Ver project.json generado
        run: cat .vercel/project.json

      - name: Deploy a Vercel (producción)
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
