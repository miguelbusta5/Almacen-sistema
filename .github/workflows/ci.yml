name: CI / Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Type-check & tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Generar Prisma Client
        run: npx prisma generate

      - name: Type-check TypeScript
        run: npx tsc --noEmit

      - name: Tests unitarios
        run: npm test

  deploy:
    name: Deploy a producción
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Crear project.json via amondnet (ignora error de version CLI)
        uses: amondnet/vercel-action@v25
        continue-on-error: true
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      - name: Verificar project.json
        run: |
          echo "=== .vercel/project.json ==="
          cat .vercel/project.json 2>/dev/null || echo "No existe"

      - name: Instalar Vercel CLI actualizado
        run: npm install -g vercel@latest

      - name: Deploy con CLI v54
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
